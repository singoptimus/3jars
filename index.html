<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3 Jars</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    background: #0f0f1a;
    color: white;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -10%;
    left: 50%;
    transform: translateX(-50%);
    width: 900px;
    height: 900px;
    background: radial-gradient(ellipse, rgba(251,191,36,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Account bar */
  .account-bar {
    position: fixed; top: 32px; right: 16px; z-index: 8500;
    display: flex; align-items: center; gap: 10px;
    font-size: 0.8em; color: rgba(255,255,255,0.4);
  }
  .account-bar a { color: rgba(255,255,255,0.5); text-decoration: none; cursor: pointer; }
  .account-bar a:hover { color: #fbbf24; }

  /* Accuracy bar */
  .error-bar-container {
    position: fixed; top: 0; left: 0; right: 0; z-index: 9000;
    background: rgba(30,30,60,0.95); padding: 6px 16px;
    display: flex; align-items: center; gap: 10px;
    font-size: 0.8em; backdrop-filter: blur(8px);
  }
  .error-bar-label { color: rgba(255,255,255,0.7); font-weight: 600; white-space: nowrap; min-width: 70px; }
  .error-bar-track { flex: 1; height: 10px; background: rgba(255,255,255,0.15); border-radius: 5px; position: relative; overflow: visible; }
  .error-bar-fill { height: 100%; border-radius: 5px; transition: width 0.5s ease, background 0.5s ease; }
  .error-bar-threshold { position: absolute; left: 75%; top: -3px; bottom: -3px; width: 2px; background: #fbbf24; border-radius: 1px; }
  .error-bar-threshold::after { content: '75%'; position: absolute; top: -16px; left: 50%; transform: translateX(-50%); font-size: 0.75em; color: #fbbf24; white-space: nowrap; }
  .error-bar-pct { color: white; font-weight: 700; min-width: 45px; text-align: right; }
  .error-bar-pts { color: #fbbf24; font-weight: 700; min-width: 60px; text-align: right; white-space: nowrap; }

  .container {
    position: relative; z-index: 10;
    max-width: 760px; width: 100%;
    margin: 0 auto;
    padding: 30px 20px;
  }

  /* ---- HERO ---- */
  .hero { text-align: center; padding: 40px 0 30px; }
  .hero-label {
    font-size: 0.75em; text-transform: uppercase; letter-spacing: 6px;
    color: rgba(255,255,255,0.3); margin-bottom: 10px;
  }
  .hero-title {
    font-size: 4em; font-weight: 900;
    background: linear-gradient(135deg, #fbbf24, #f472b6, #818cf8, #34d399);
    background-size: 300% 300%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: grad 6s ease infinite;
    margin-bottom: 8px;
  }
  @keyframes grad { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
  .hero-tagline { font-size: 1.15em; color: rgba(255,255,255,0.4); margin-bottom: 36px; }

  /* 3 Jar hero cards */
  .jars-hero { display: flex; justify-content: center; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; }
  .jar-hero-card {
    width: 200px; padding: 28px 18px 24px; border-radius: 22px;
    text-align: center; transition: transform 0.3s, box-shadow 0.3s; cursor: default;
  }
  .jar-hero-card:hover { transform: translateY(-5px); }
  .jar-hero-card.present {
    background: linear-gradient(160deg, rgba(251,191,36,0.14), rgba(251,191,36,0.03));
    border: 1px solid rgba(251,191,36,0.25);
  }
  .jar-hero-card.invest {
    background: linear-gradient(160deg, rgba(52,211,153,0.14), rgba(52,211,153,0.03));
    border: 1px solid rgba(52,211,153,0.25);
  }
  .jar-hero-card.give {
    background: linear-gradient(160deg, rgba(167,139,250,0.14), rgba(167,139,250,0.03));
    border: 1px solid rgba(167,139,250,0.25);
  }
  .jar-emoji { font-size: 2.6em; margin-bottom: 10px; display: block; animation: jarBob 3s ease-in-out infinite; }
  .jar-hero-card.invest .jar-emoji { animation-delay: 0.4s; }
  .jar-hero-card.give .jar-emoji { animation-delay: 0.8s; }
  @keyframes jarBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
  .jar-name { font-size: 0.75em; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.45); margin-bottom: 6px; }
  .jar-amount { font-size: 1.9em; font-weight: 800; }
  .jar-hero-card.present .jar-amount { color: #fbbf24; }
  .jar-hero-card.invest .jar-amount { color: #34d399; }
  .jar-hero-card.give .jar-amount { color: #a78bfa; }
  .jar-desc { font-size: 0.75em; color: rgba(255,255,255,0.28); margin-top: 6px; line-height: 1.3; }

  .progress-row { max-width: 480px; margin: 0 auto 10px; text-align: center; }
  .progress-label { font-size: 0.78em; color: rgba(255,255,255,0.28); margin-bottom: 6px; }
  .progress-track { height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #fbbf24, #34d399, #a78bfa); transition: width 0.5s; }
  .jars-link { display: inline-block; margin-top: 10px; font-size: 0.8em; color: rgba(255,255,255,0.3); text-decoration: none; transition: color 0.2s; }
  .jars-link:hover { color: #fbbf24; }
  .no-player-msg { color: rgba(255,255,255,0.25); font-size: 0.9em; padding: 20px 0; }

  /* ---- PLAYER STRIP ---- */
  .player-strip {
    display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;
    padding: 24px 0; margin-bottom: 8px;
    border-top: 1px solid rgba(255,255,255,0.06);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .player-chip {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1);
    border-radius: 50px; padding: 6px 16px 6px 6px;
    cursor: pointer; transition: all 0.2s; position: relative;
  }
  .player-chip:hover { border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.08); }
  .player-chip.selected { border-color: #fbbf24; background: rgba(251,191,36,0.07); }
  .chip-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 1.1em;
  }
  .chip-info { text-align: left; }
  .chip-name { font-size: 0.85em; font-weight: 700; color: white; }
  .chip-pts { font-size: 0.68em; color: #fbbf24; font-weight: 600; }
  .chip-remove {
    position: absolute; top: -6px; right: -6px;
    width: 18px; height: 18px; border-radius: 50%;
    background: rgba(255,255,255,0.1); border: none;
    color: rgba(255,255,255,0.3); font-size: 0.6em;
    cursor: pointer; display: none; align-items: center; justify-content: center;
  }
  .player-chip:hover .chip-remove { display: flex; }
  .chip-remove:hover { background: #f87171; color: white; }
  .add-chip {
    border-style: dashed; opacity: 0.5;
  }
  .add-chip:hover { opacity: 0.8; }
  .prompt-msg {
    text-align: center; margin-bottom: 8px;
    font-size: 0.9em; color: rgba(255,255,255,0.35); transition: all 0.3s;
  }
  .prompt-msg.active { color: #fbbf24; font-weight: 600; }

  /* ---- GAMES GRID ---- */
  .games-area { padding: 30px 0; }
  .games-heading {
    font-size: 0.8em; text-transform: uppercase; letter-spacing: 3px;
    color: rgba(255,255,255,0.3); margin-bottom: 16px; text-align: center;
  }
  .cat-label {
    font-size: 0.68em; text-transform: uppercase; letter-spacing: 2px;
    color: rgba(255,255,255,0.2); padding: 14px 0 6px;
    grid-column: 1 / -1;
  }
  .cat-label:first-child { padding-top: 0; }
  .games-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    max-width: 580px; margin: 0 auto;
  }
  .game-tile {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px; padding: 16px 18px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer; transition: all 0.2s; text-decoration: none; color: white;
  }
  .game-tile:hover {
    background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15);
    transform: translateY(-2px);
  }
  .game-tile.needs-player { opacity: 0.5; cursor: not-allowed; }
  .game-tile.needs-player:hover { transform: none; background: rgba(255,255,255,0.04); }
  .game-tile-icon { font-size: 1.4em; flex-shrink: 0; width: 32px; text-align: center; }
  .game-tile-info { flex: 1; min-width: 0; }
  .game-tile-name { font-size: 0.9em; font-weight: 600; }
  .game-tile-pts { font-size: 0.68em; color: rgba(255,255,255,0.35); margin-top: 1px; }
  .game-tile-pts.hot { color: #fbbf24; }

  .exam-row { grid-column: 1 / -1; text-align: center; margin-top: 16px; }
  .exam-btn {
    display: inline-flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, #dc2626, #991b1b);
    color: white; padding: 14px 34px; border-radius: 50px;
    font-size: 1.05em; font-weight: 700; text-decoration: none;
    border: none; cursor: pointer; transition: transform 0.2s;
  }
  .exam-btn:hover { transform: scale(1.05); }
  .exam-btn.needs-player { opacity: 0.5; cursor: not-allowed; }
  .exam-btn.needs-player:hover { transform: none; }

  /* ---- PHILOSOPHY ---- */
  .philosophy {
    max-width: 580px; margin: 10px auto 0; padding: 28px;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 18px; text-align: center;
  }
  .philosophy h3 { font-size: 1em; color: rgba(255,255,255,0.55); margin-bottom: 10px; }
  .philosophy p { font-size: 0.83em; color: rgba(255,255,255,0.28); line-height: 1.7; }

  .footer {
    text-align: center; padding: 24px 0; color: rgba(255,255,255,0.15); font-size: 0.8em;
  }
  .reset-btn {
    background: none; border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.2);
    padding: 5px 14px; border-radius: 20px; font-size: 0.85em; cursor: pointer;
    transition: all 0.2s; margin-top: 10px;
  }
  .reset-btn:hover { border-color: rgba(255,80,80,0.3); color: rgba(255,80,80,0.5); }

  /* Modal overlay */
  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7); z-index: 8000;
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal-card {
    background: linear-gradient(135deg, #1e1b4b, #312e81);
    border: 2px solid rgba(255,255,255,0.15); border-radius: 24px;
    padding: 36px; max-width: 400px; width: 90%; color: white;
  }
  .modal-title { font-size: 1.4em; font-weight: 700; margin-bottom: 20px; text-align: center; }
  .modal-label { font-size: 0.8em; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; margin-top: 16px; text-align: left; }
  .modal-input {
    width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.15); border-radius: 12px;
    color: white; font-size: 1.05em; outline: none;
  }
  .modal-input:focus { border-color: rgba(251,191,36,0.5); }
  .emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; margin-top: 8px; }
  .emoji-option {
    padding: 8px; border-radius: 10px; border: 2px solid transparent;
    background: rgba(255,255,255,0.06); cursor: pointer; font-size: 1.4em;
    text-align: center; transition: all 0.2s;
  }
  .emoji-option:hover { background: rgba(255,255,255,0.12); }
  .emoji-option.selected { border-color: #fbbf24; background: rgba(251,191,36,0.15); }
  .color-grid { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
  .color-option {
    width: 36px; height: 36px; border-radius: 50%;
    border: 3px solid transparent; cursor: pointer; transition: all 0.2s;
  }
  .color-option:hover { transform: scale(1.15); }
  .color-option.selected { border-color: white; transform: scale(1.15); }
  .modal-buttons { display: flex; gap: 10px; margin-top: 24px; }
  .modal-btn {
    flex: 1; padding: 12px; border-radius: 12px; border: none;
    font-size: 1em; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .modal-btn.primary { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #1e1b4b; }
  .modal-btn.secondary { background: rgba(255,255,255,0.1); color: white; }
  .modal-btn:hover { transform: translateY(-1px); }

  /* Celebration overlays */
  .celebration-overlay, .celeb10k-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 9999; display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.7); animation: fadeIn 0.5s ease;
    overflow-y: auto; padding: 20px;
  }
  .celebration-card, .celeb10k-card {
    text-align: center;
    background: linear-gradient(135deg, #1e1b4b, #312e81);
    border: 3px solid #fbbf24; border-radius: 24px;
    padding: 40px 50px; max-width: 480px;
    box-shadow: 0 0 60px rgba(251,191,36,0.3);
    animation: celebBounce 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes celebBounce {
    0% { transform: scale(0.3) rotate(-5deg); opacity: 0; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  .celeb-medal, .celeb10k-trophy { font-size: 5em; animation: medalSpin 1s ease 0.3s both; display: block; margin-bottom: 12px; }
  @keyframes medalSpin {
    0% { transform: rotateY(0) scale(0); opacity: 0; }
    50% { transform: rotateY(360deg) scale(1.2); opacity: 1; }
    100% { transform: rotateY(720deg) scale(1); }
  }
  .celeb-title { font-size: 2.2em; font-weight: 800; color: #fbbf24; text-shadow: 0 0 20px rgba(251,191,36,0.5); margin-bottom: 8px; }
  .celeb10k-title {
    font-size: 2.4em; font-weight: 800;
    background: linear-gradient(135deg, #fbbf24, #f472b6, #818cf8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 8px;
  }
  .celeb-name, .celeb10k-name { font-size: 1.5em; font-weight: 700; color: #fff; margin-bottom: 12px; }
  .celeb-stats { font-size: 1.1em; color: rgba(255,255,255,0.7); margin-bottom: 24px; line-height: 1.6; }
  .celeb-stats strong { color: #34d399; }
  .celeb-close {
    background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #1e1b4b;
    border: none; padding: 12px 36px; border-radius: 30px;
    font-size: 1.1em; font-weight: 700; cursor: pointer; transition: transform 0.2s;
  }
  .celeb-close:hover { transform: scale(1.05); }
  .jars-reveal { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
  .jar-reveal-card {
    background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.15);
    border-radius: 18px; padding: 16px 14px; width: 130px;
    animation: jarPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .jar-reveal-card:nth-child(1) { animation-delay: 0.6s; border-color: rgba(251,191,36,0.4); }
  .jar-reveal-card:nth-child(2) { animation-delay: 0.9s; border-color: rgba(52,211,153,0.4); }
  .jar-reveal-card:nth-child(3) { animation-delay: 1.2s; border-color: rgba(168,85,247,0.4); }
  @keyframes jarPop { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  .jar-reveal-icon { font-size: 2em; margin-bottom: 4px; }
  .jar-reveal-label { font-size: 0.72em; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
  .jar-reveal-value { font-size: 1.2em; font-weight: 800; color: white; }
  .celeb10k-msg { color: rgba(255,255,255,0.6); font-size: 0.9em; line-height: 1.6; margin-bottom: 20px; }

  .confetti-piece {
    position: fixed; width: 10px; height: 10px; z-index: 10000;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    80% { opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  @media (max-width: 600px) {
    .hero-title { font-size: 2.8em; }
    .jars-hero { flex-direction: column; align-items: center; }
    .jar-hero-card { width: 85%; max-width: 260px; }
    .games-grid { grid-template-columns: 1fr; }
    .player-strip { gap: 8px; }
    .celebration-card, .celeb10k-card { padding: 28px 20px; margin: 20px; }
  }
</style>
</head>
<body>

<div class="error-bar-container" id="errorBar" style="display:none;"></div>
<div class="account-bar" id="accountBar"></div>
<div class="container" id="app"></div>

<script>
  // ---- Account check ----
  let currentAccountId = sessionStorage.getItem('km_currentAccount');
  if (!currentAccountId) { window.location.href = 'login.html'; throw new Error('No account'); }
  let selectedPlayer = '';

  // ---- Account-scoped data layer ----
  function getAccountData() {
    try { const accts = JSON.parse(localStorage.getItem('km_accounts') || '{}'); return accts[currentAccountId] || {}; } catch(e) {} return {};
  }
  function updateAccountData(updates) {
    try {
      const accts = JSON.parse(localStorage.getItem('km_accounts') || '{}');
      accts[currentAccountId] = accts[currentAccountId] || {};
      Object.assign(accts[currentAccountId], updates);
      localStorage.setItem('km_accounts', JSON.stringify(accts));
    } catch(e) {}
  }
  function getScores() { try { const r = localStorage.getItem('km_' + currentAccountId + '_scores'); if (r) return JSON.parse(r); } catch(e) {} return {}; }
  function saveScores(s) { localStorage.setItem('km_' + currentAccountId + '_scores', JSON.stringify(s)); }
  function getStats() { try { const r = localStorage.getItem('km_' + currentAccountId + '_stats'); if (r) return JSON.parse(r); } catch(e) {} return {}; }
  function saveStats(s) { localStorage.setItem('km_' + currentAccountId + '_stats', JSON.stringify(s)); }
  function getCelebrations() { try { const r = localStorage.getItem('km_' + currentAccountId + '_celebrations'); if (r) return JSON.parse(r); } catch(e) {} return {}; }
  function saveCelebrations(c) { localStorage.setItem('km_' + currentAccountId + '_celebrations', JSON.stringify(c)); }
  function getJars() { try { const r = localStorage.getItem('km_' + currentAccountId + '_jars'); if (r) return JSON.parse(r); } catch(e) {} return {}; }
  function saveJars(j) { localStorage.setItem('km_' + currentAccountId + '_jars', JSON.stringify(j)); }

  function getPlayerJars(playerName) {
    const jars = getJars();
    return jars[playerName] || { present: { balance: 0, history: [] }, investing: { balance: 0, history: [] }, giveback: { balance: 0, history: [] } };
  }
  function getConfig() {
    try { const raw = localStorage.getItem('km_' + currentAccountId + '_config'); if (raw) return JSON.parse(raw); } catch(e) {}
    return { experienceAmount: 50, investingAmount: 10, givebackAmount: 10 };
  }
  function awardJars(playerName) {
    const jars = getJars();
    const cfg = getConfig();
    if (!jars[playerName]) jars[playerName] = { present: { balance: 0, history: [] }, investing: { balance: 0, history: [] }, giveback: { balance: 0, history: [] } };
    const pj = jars[playerName]; const now = Date.now();
    const expAmt = cfg.experienceAmount ?? 50;
    const invAmt = cfg.investingAmount ?? 10;
    const giveAmt = cfg.givebackAmount ?? 10;
    pj.present.balance += expAmt;
    pj.present.history.push({ date: now, amount: expAmt });
    pj.investing.balance += invAmt; pj.investing.history.push({ date: now, amount: invAmt });
    pj.giveback.balance += giveAmt; pj.giveback.history.push({ date: now, amount: giveAmt });
    saveJars(jars); return pj;
  }
  function getSelectedPlayer() { return localStorage.getItem('km_' + currentAccountId + '_player') || ''; }
  function setSelectedPlayer(name) { localStorage.setItem('km_' + currentAccountId + '_player', name); }
  function getAccountPlayers() { return (getAccountData().players || []); }
  function getAccountDisplayName() { return getAccountData().displayName || 'Users'; }

  selectedPlayer = getSelectedPlayer();

  let audioCtx = null;
  function getAudioCtx() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }

  function getAccuracy(playerName) {
    const stats = getStats(); const s = stats[playerName];
    if (!s || s.total === 0) return null;
    return Math.round((s.correct / s.total) * 100);
  }

  function updateErrorBar() {
    const bar = document.getElementById('errorBar');
    if (!selectedPlayer) { bar.style.display = 'none'; return; }
    const stats = getStats(); const s = stats[selectedPlayer] || { correct: 0, total: 0 };
    const scores = getScores(); const totalPts = scores[selectedPlayer] || 0;
    const accuracy = s.total > 0 ? Math.round((s.correct / s.total) * 100) : 100;
    const barColor = accuracy >= 75 ? '#34d399' : accuracy >= 50 ? '#fbbf24' : '#f87171';
    bar.style.display = 'flex';
    bar.innerHTML = '<span class="error-bar-label">' + selectedPlayer + ' Accuracy</span>' +
      '<div class="error-bar-track"><div class="error-bar-fill" style="width:' + accuracy + '%;background:' + barColor + ';"></div><div class="error-bar-threshold"></div></div>' +
      '<span class="error-bar-pct" style="color:' + barColor + ';">' + accuracy + '%</span>' +
      '<span class="error-bar-pts">' + totalPts.toLocaleString() + ' pts</span>';
  }

  function darkenColor(color) {
    const hex = color.replace('#', '');
    const r = Math.max(0, parseInt(hex.slice(0,2), 16) - 30);
    const g = Math.max(0, parseInt(hex.slice(2,4), 16) - 30);
    const b = Math.max(0, parseInt(hex.slice(4,6), 16) - 30);
    return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
  }

  // ---- RENDER ----
  function render() {
    const scores = getScores();
    const players = getAccountPlayers();
    const app = document.getElementById('app');

    // Jars section (always visible)
    let jarsHTML;
    if (selectedPlayer) {
      const pj = getPlayerJars(selectedPlayer);
      const score = scores[selectedPlayer] || 0;
      const prog = score % 10000;
      const pct = Math.round((prog / 10000) * 100);
      jarsHTML = `
        <div class="jars-hero">
          <div class="jar-hero-card present">
            <span class="jar-emoji">🎉</span>
            <div class="jar-name">Experience with Family</div>
            <div class="jar-amount">$${pj.present.balance}</div>
            <div class="jar-desc">Arcade · Ice Cream · Movie</div>
          </div>
          <div class="jar-hero-card invest">
            <span class="jar-emoji">💰</span>
            <div class="jar-name">Investing Jar</div>
            <div class="jar-amount">$${pj.investing.balance}</div>
            <div class="jar-desc">Save & invest in stocks</div>
          </div>
          <div class="jar-hero-card give">
            <span class="jar-emoji">💝</span>
            <div class="jar-name">Give Back Jar</div>
            <div class="jar-amount">$${pj.giveback.balance}</div>
            <div class="jar-desc">Save & donate</div>
          </div>
        </div>
        <div class="progress-row">
          <div class="progress-label">${prog.toLocaleString()} / 10,000 pts to next reward</div>
          <div class="progress-track"><div class="progress-fill" style="width:${pct}%;"></div></div>
        </div>
        <a class="jars-link" href="MyJars.html?player=${encodeURIComponent(selectedPlayer)}">View Full Jar Details →</a>`;
    } else {
      jarsHTML = `
        <div class="jars-hero">
          <div class="jar-hero-card present"><span class="jar-emoji">🎉</span><div class="jar-name">Experience with Family</div><div class="jar-amount">–</div><div class="jar-desc">Arcade · Ice Cream · Movie</div></div>
          <div class="jar-hero-card invest"><span class="jar-emoji">💰</span><div class="jar-name">Investing Jar</div><div class="jar-amount">–</div><div class="jar-desc">Save & invest in stocks</div></div>
          <div class="jar-hero-card give"><span class="jar-emoji">💝</span><div class="jar-name">Give Back Jar</div><div class="jar-amount">–</div><div class="jar-desc">Save & donate</div></div>
        </div>
        <div class="no-player-msg">Select a player to track jars</div>`;
    }

    // Player strip
    let stripHTML = '';
    for (const p of players) {
      const ps = scores[p.name] || 0;
      const isSel = selectedPlayer === p.name;
      stripHTML += `
        <div class="player-chip ${isSel ? 'selected' : ''}" onclick="selectPlayer('${p.name.replace(/'/g, "\\'")}')">
          <button class="chip-remove" onclick="event.stopPropagation(); confirmRemovePlayer('${p.name.replace(/'/g, "\\'")}');">✕</button>
          <div class="chip-avatar" style="background: linear-gradient(135deg, ${p.color}, ${darkenColor(p.color)});">${p.emoji}</div>
          <div class="chip-info">
            <div class="chip-name">${p.name}</div>
            <div class="chip-pts">${ps.toLocaleString()} pts</div>
          </div>
        </div>`;
    }
    stripHTML += `
      <div class="player-chip add-chip" onclick="showAddPlayerModal()">
        <div class="chip-avatar" style="background: rgba(255,255,255,0.08);">+</div>
        <div class="chip-info"><div class="chip-name" style="color:rgba(255,255,255,0.4);">Add</div></div>
      </div>`;

    // Games
    const np = !selectedPlayer;
    const cls = np ? 'game-tile needs-player' : 'game-tile';
    const href = (file) => np ? '' : 'href="' + file + '?player=' + encodeURIComponent(selectedPlayer) + '"';
    const oc = np ? 'onclick="flashPrompt(); return false;"' : '';
    const gamesHTML = `
      <div class="games-heading">Choose a Game</div>
      <div class="games-grid">
        <div class="cat-label">📊 Math</div>
        <a class="${cls}" ${href('KidsMath.html')} ${oc}><span class="game-tile-icon">✖️</span><div class="game-tile-info"><div class="game-tile-name">Rule of X</div><div class="game-tile-pts">1-3 pts</div></div></a>
        <a class="${cls}" ${href('AddSub.html')} ${oc}><span class="game-tile-icon">➕</span><div class="game-tile-info"><div class="game-tile-name">Add & Subtract</div><div class="game-tile-pts">1-3 pts</div></div></a>
        <a class="${cls}" ${href('MulFrac.html')} ${oc}><span class="game-tile-icon">✖️➗</span><div class="game-tile-info"><div class="game-tile-name">Multiply & Divide</div><div class="game-tile-pts">2-5 pts</div></div></a>
        <a class="${cls}" ${href('MathStories.html')} ${oc}><span class="game-tile-icon">📖</span><div class="game-tile-info"><div class="game-tile-name">Math Stories</div><div class="game-tile-pts">2-5 pts</div></div></a>
        <a class="${cls}" ${href('Geometry.html')} ${oc}><span class="game-tile-icon">📐</span><div class="game-tile-info"><div class="game-tile-name">Geometry</div><div class="game-tile-pts">2-5 pts</div></div></a>
        <div class="cat-label">🔤 Hebrew</div>
        <a class="${cls}" ${href('Hebrew.html')} ${oc}><span class="game-tile-icon">אב</span><div class="game-tile-info"><div class="game-tile-name">Hebrew Letters & Words</div><div class="game-tile-pts">2-5 pts</div></div></a>
        <div class="cat-label">🧠 Puzzles & IQ</div>
        <a class="${cls}" ${href('Patterns.html')} ${oc}><span class="game-tile-icon">🧩</span><div class="game-tile-info"><div class="game-tile-name">Shape Patterns</div><div class="game-tile-pts hot">🔥 3-9 pts</div></div></a>
        <a class="${cls}" ${href('Matrix.html')} ${oc}><span class="game-tile-icon">🧠</span><div class="game-tile-info"><div class="game-tile-name">Matrix Puzzles</div><div class="game-tile-pts hot">🔥 3-9 pts</div></div></a>
        <div class="exam-row">
          <a class="exam-btn ${np ? 'needs-player' : ''}" ${np ? '' : 'href="Exam.html?player=' + encodeURIComponent(selectedPlayer) + '"'} ${oc}>⏱️ 5-Minute Exam — score 75%+ for bonus points!</a>
        </div>
      </div>`;

    app.innerHTML = `
      <div class="hero">
        <div class="hero-label">Welcome to</div>
        <h1 class="hero-title">3 Jars</h1>
        <p class="hero-tagline">Every question fills a jar</p>
        ${jarsHTML}
      </div>
      <p class="prompt-msg ${!selectedPlayer ? 'active' : ''}" id="prompt">
        ${selectedPlayer ? '<strong>' + selectedPlayer + '</strong> is playing!' : 'Tap a player to start'}
      </p>
      <div class="player-strip">${stripHTML}</div>
      <div class="games-area">${gamesHTML}</div>
      <div class="philosophy">
        <h3>💡 Why 3 Jars?</h3>
        <p>Every math problem, Hebrew word, and pattern earns points. At 10,000 points (75%+ accuracy), three things happen: you celebrate with a fun family experience (Experience with Family), you invest toward your first stock (Investing Jar), and you give back to the community (Give Back Jar). Parents can configure exactly how much goes into each jar in <a href="settings.html" style="color:#fbbf24;">Settings</a>. Because success isn't just about earning — it's about enjoying, growing, and being kind.</p>
      </div>
      <div class="footer">
        Made with love<br>
        <button class="reset-btn" onclick="resetScores()">Reset Scores</button>
      </div>`;
  }

  function selectPlayer(name) {
    selectedPlayer = name;
    setSelectedPlayer(name);
    render(); updateErrorBar();
    showToast("Let's go, " + name + "! Pick a game!");
  }

  function flashPrompt() {
    const el = document.getElementById('prompt');
    if (el) { el.style.color = '#fbbf24'; el.style.transform = 'scale(1.1)'; setTimeout(() => { el.style.transform = 'scale(1)'; }, 300); }
  }

  function resetScores() {
    if (confirm('Reset all scores to zero?')) { saveScores({}); render(); }
  }

  function showToast(msg) {
    document.querySelectorAll('.toast-msg').forEach(t => t.remove());
    const toast = document.createElement('div');
    toast.className = 'toast-msg';
    toast.textContent = msg;
    toast.style.cssText = 'position:fixed;top:30px;left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(255,255,255,0.15);backdrop-filter:blur(20px);color:white;padding:14px 30px;border-radius:50px;font-weight:700;font-size:1.1em;z-index:999;border:1px solid rgba(255,255,255,0.2);opacity:0;transition:all 0.4s ease;';
    document.body.appendChild(toast);
    requestAnimationFrame(() => { toast.style.opacity = '1'; toast.style.transform = 'translateX(-50%) translateY(0)'; });
    setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(-50%) translateY(-20px)'; setTimeout(() => toast.remove(), 400); }, 2000);
  }

  // ---- Add Player Modal ----
  let modalState = { name: '', emoji: '🏀', color: '#667eea' };
  const emojiOptions = ['🏀', '⚽', '🎨', '🎵', '🎮', '🏊', '🏃', '⭐', '🦄', '🐱', '🐶', '🌟', '🎯', '🚀', '🎸', '🏆'];
  const colorOptions = ['#667eea', '#f472b6', '#34d399', '#f59e0b', '#06b6d4', '#8b5cf6', '#ec4899', '#14b8a6'];

  function showAddPlayerModal() {
    modalState = { name: '', emoji: '🏀', color: '#667eea' };
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay'; overlay.id = 'addPlayerModal';
    overlay.innerHTML = '<div class="modal-card"><div class="modal-title">Add New Player</div><div class="modal-label">Player Name</div><input class="modal-input" type="text" id="playerNameInput" placeholder="Enter name" maxlength="20"><div class="modal-label">Pick an Emoji</div><div class="emoji-grid" id="emojiGrid"></div><div class="modal-label">Pick a Color</div><div class="color-grid" id="colorGrid"></div><div class="modal-buttons"><button class="modal-btn secondary" onclick="closeAddPlayerModal()">Cancel</button><button class="modal-btn primary" onclick="saveNewPlayer()">Add Player</button></div></div>';
    document.body.appendChild(overlay);
    const emojiGrid = document.getElementById('emojiGrid');
    emojiOptions.forEach(e => { const btn = document.createElement('div'); btn.className = 'emoji-option' + (e === modalState.emoji ? ' selected' : ''); btn.textContent = e; btn.onclick = () => { document.querySelectorAll('#emojiGrid .emoji-option').forEach(x => x.classList.remove('selected')); btn.classList.add('selected'); modalState.emoji = e; }; emojiGrid.appendChild(btn); });
    const colorGrid = document.getElementById('colorGrid');
    colorOptions.forEach(c => { const btn = document.createElement('div'); btn.className = 'color-option' + (c === modalState.color ? ' selected' : ''); btn.style.background = c; btn.onclick = () => { document.querySelectorAll('#colorGrid .color-option').forEach(x => x.classList.remove('selected')); btn.classList.add('selected'); modalState.color = c; }; colorGrid.appendChild(btn); });
    setTimeout(() => document.getElementById('playerNameInput').focus(), 100);
  }
  function closeAddPlayerModal() { const m = document.getElementById('addPlayerModal'); if (m) m.remove(); }
  function saveNewPlayer() {
    const name = document.getElementById('playerNameInput').value.trim();
    if (!name) { showToast('Please enter a name'); return; }
    const players = getAccountPlayers();
    if (players.some(p => p.name === name)) { showToast('Player already exists'); return; }
    players.push({ name, emoji: modalState.emoji, color: modalState.color });
    updateAccountData({ players }); closeAddPlayerModal(); render(); showToast(name + ' added!');
  }
  function confirmRemovePlayer(name) { if (confirm('Remove ' + name + '?')) removePlayer(name); }
  function removePlayer(name) {
    let players = getAccountPlayers().filter(p => p.name !== name);
    updateAccountData({ players });
    const scores = getScores(); delete scores[name]; saveScores(scores);
    const stats = getStats(); delete stats[name]; saveStats(stats);
    const celebs = getCelebrations(); delete celebs[name]; saveCelebrations(celebs);
    if (selectedPlayer === name) { selectedPlayer = ''; setSelectedPlayer(''); }
    render(); updateErrorBar(); showToast(name + ' removed');
  }

  function updateAccountBar() {
    const acct = getAccountData();
    const bar = document.getElementById('accountBar');
    bar.innerHTML = '<span>Logged in as <strong>' + (acct.displayName || 'Account') + '</strong> (' + (acct.email || currentAccountId) + ')</span> <a href="settings.html" style="margin-left:4px;">⚙️ Settings</a> <a onclick="logout();">Logout</a>';
  }
  function logout() { if (confirm('Logout?')) { sessionStorage.removeItem('km_currentAccount'); window.location.href = 'login.html'; } }

  // ---- Celebrations ----
  function launchConfettiRain() {
    const colors = ['#fbbf24','#f87171','#34d399','#818cf8','#f472b6','#38bdf8','#fb923c'];
    for (let i = 0; i < 120; i++) {
      setTimeout(() => {
        const p = document.createElement('div'); p.className = 'confetti-piece';
        p.style.left = Math.random()*100+'vw'; p.style.background = colors[Math.floor(Math.random()*colors.length)];
        p.style.width = (6+Math.random()*8)+'px'; p.style.height = (6+Math.random()*8)+'px';
        p.style.borderRadius = Math.random()>0.5?'50%':'2px'; p.style.animationDuration = (2+Math.random()*3)+'s';
        document.body.appendChild(p); setTimeout(() => p.remove(), 5000);
      }, i * 30);
    }
  }
  function playCelebrationSound() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [523,659,784,1047,784,1047,1319].forEach((freq, i) => {
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.type = 'sine'; osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.15, ctx.currentTime + i*0.15);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.15 + 0.4);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(ctx.currentTime + i*0.15); osc.stop(ctx.currentTime + i*0.15 + 0.4);
      });
    } catch(e) {}
  }
  function showCelebration(playerName, score, accuracy) {
    launchConfettiRain(); playCelebrationSound();
    const ov = document.createElement('div'); ov.className = 'celebration-overlay';
    ov.innerHTML = '<div class="celebration-card"><span class="celeb-medal">🏅</span><div class="celeb-title">1,000 POINTS!</div><div class="celeb-name">' + playerName + ' is a Math Champion!</div><div class="celeb-stats"><strong>' + score.toLocaleString() + '</strong> points earned<br><strong>' + accuracy + '%</strong> accuracy</div><button class="celeb-close" onclick="this.closest(\'.celebration-overlay\').remove();">Keep Playing!</button></div>';
    document.body.appendChild(ov);
    const stats = getStats(); if (stats[playerName]) { stats[playerName] = { correct: 0, total: 0 }; saveStats(stats); }
    updateErrorBar(); render();
  }
  function show10KCelebration(playerName, score, accuracy) {
    launchConfettiRain(); playCelebrationSound();
    const pj = awardJars(playerName);
    const ov = document.createElement('div'); ov.className = 'celeb10k-overlay';
    const cfg = getConfig();
    ov.innerHTML = '<div class="celeb10k-card"><span class="celeb10k-trophy">🏆</span><div class="celeb10k-title">10,000 POINTS!</div><div class="celeb10k-name">' + playerName + ' is a SUPERSTAR!</div><div class="jars-reveal"><div class="jar-reveal-card"><div class="jar-reveal-icon">🎉</div><div class="jar-reveal-label">Experience with Family</div><div class="jar-reveal-value">$' + pj.present.balance + '</div></div><div class="jar-reveal-card"><div class="jar-reveal-icon">💰</div><div class="jar-reveal-label">Investing Jar</div><div class="jar-reveal-value">$' + pj.investing.balance + '</div></div><div class="jar-reveal-card"><div class="jar-reveal-icon">💝</div><div class="jar-reveal-label">Give Back Jar</div><div class="jar-reveal-value">$' + pj.giveback.balance + '</div></div></div><div class="celeb10k-msg">You earned <strong>$' + cfg.experienceAmount + '</strong> toward a Family Experience — choose: Arcade Trip, Ice Cream Date, or Movie Night!<br>Plus <strong>$' + cfg.investingAmount + '</strong> in your Investing Jar and <strong>$' + cfg.givebackAmount + '</strong> in your Give Back Jar!</div><button class="celeb-close" onclick="this.closest(\'.celeb10k-overlay\').remove();">Amazing! Keep Going!</button></div>';
    document.body.appendChild(ov);
    const stats = getStats(); if (stats[playerName]) { stats[playerName] = { correct: 0, total: 0 }; saveStats(stats); }
    updateErrorBar(); render();
  }
  function checkCelebrations() {
    const scores = getScores(); const celebs = getCelebrations(); const players = getAccountPlayers();
    for (const p of players) {
      const score = scores[p.name] || 0; const acc = getAccuracy(p.name);
      const playerCeleb = celebs[p.name] || {};
      const last10K = playerCeleb.last10KMilestone || 0;
      const current10K = Math.floor(score / 10000) * 10000;
      if (current10K > 0 && current10K > last10K && acc !== null && acc >= 75) {
        if (typeof celebs[p.name] !== 'object' || celebs[p.name] === true) celebs[p.name] = { reached1K: true };
        celebs[p.name].last10KMilestone = current10K; saveCelebrations(celebs);
        setTimeout(() => show10KCelebration(p.name, score, acc), 800); return;
      }
      const reached1K = typeof playerCeleb === 'object' ? playerCeleb.reached1K : playerCeleb;
      if (score >= 1000 && !reached1K) {
        if (acc !== null && acc >= 75) {
          if (typeof celebs[p.name] !== 'object') celebs[p.name] = {};
          celebs[p.name].reached1K = true; saveCelebrations(celebs);
          setTimeout(() => showCelebration(p.name, score, acc), 800); return;
        }
      }
    }
  }

  // ---- Init ----
  updateAccountBar(); render(); updateErrorBar(); checkCelebrations();
</script>
</body>
</html>
