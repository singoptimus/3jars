<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5-Minute Exam</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 36px 20px 20px 20px;
  }
  .game-container {
    background: white;
    border-radius: 24px;
    padding: 40px;
    max-width: 640px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    text-align: center;
  }
  h1 { font-size: 2.2em; color: #7f1d1d; margin-bottom: 8px; }
  .subtitle { color: #888; font-size: 1.1em; margin-bottom: 24px; }

  /* Player banner */
  .player-banner {
    display: inline-flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, #fee2e2, #fecaca);
    border: 2px solid #fca5a5; border-radius: 50px;
    padding: 8px 20px 8px 10px; margin-bottom: 20px; font-size: 1em;
  }
  .pb-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 0.9em; color: white;
  }
  .pb-avatar.ozzy { background: linear-gradient(135deg, #667eea, #764ba2); }
  .pb-avatar.elinor { background: linear-gradient(135deg, #f472b6, #e94560); }
  .pb-avatar.adam { background: linear-gradient(135deg, #34d399, #059669); }
  .pb-name { font-weight: 700; color: #7f1d1d; }
  .pb-pts { color: #dc2626; font-weight: 700; }

  /* Score bar */
  .score-bar {
    display: flex; justify-content: center; gap: 30px;
    margin-bottom: 24px; font-size: 1.05em; color: #6b7280;
  }
  .score-bar span { font-weight: 700; color: #7f1d1d; }

  /* Timer */
  .timer-display {
    font-size: 2.6em; font-weight: 900; color: #dc2626;
    font-family: 'Courier New', monospace;
    margin-bottom: 16px; padding: 12px; border-radius: 16px;
    background: #fef2f2; border: 3px solid #fca5a5;
    transition: all 0.2s;
  }
  .timer-display.warning {
    background: #fee2e2; border-color: #f87171; color: #b91c1c;
    animation: pulse 0.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  /* Setup screen */
  .setup { margin-bottom: 30px; }
  .setup label {
    font-size: 1.2em; color: #555; display: block; margin-bottom: 12px;
  }
  .difficulty-toggle {
    display: flex; gap: 8px; justify-content: center;
    margin-top: 12px; margin-bottom: 6px;
  }
  .diff-btn {
    padding: 8px 18px; border-radius: 20px;
    border: 2px solid #fca5a5; background: white;
    color: #7f1d1d; font-weight: 600; cursor: pointer;
    font-size: 0.9em; transition: all 0.2s;
  }
  .diff-btn:hover { background: #fee2e2; }
  .diff-btn.active {
    background: #dc2626; color: white; border-color: #dc2626;
  }
  .go-btn {
    background: linear-gradient(135deg, #dc2626, #991b1b);
    color: white; border: none;
    padding: 14px 48px; font-size: 1.3em;
    border-radius: 50px; cursor: pointer;
    font-weight: 700; transition: all 0.2s; margin-top: 16px;
  }
  .go-btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(220,38,38,0.4); }

  /* Question display */
  .question-area {
    background: #fef2f2; border: 3px solid #fca5a5;
    border-radius: 20px; padding: 30px 20px; margin: 20px 0 28px;
    text-align: left;
  }
  .question-category {
    font-size: 0.9em; font-weight: 700;
    color: #dc2626; text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 12px;
  }
  .question-text {
    font-size: 1.5em; font-weight: 600; color: #7f1d1d;
    margin-bottom: 20px;
  }

  /* Answer input */
  .answer-row {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; margin-top: 16px;
  }
  .answer-input {
    font-family: 'Courier New', Courier, monospace;
    font-size: 1.6em; font-weight: 700; text-align: center;
    width: 180px; padding: 10px 16px;
    border: 3px solid #fbbf24; border-radius: 16px;
    background: #fffbeb; color: #92400e; outline: none; transition: all 0.2s;
    direction: ltr; /* prevent RTL reversal of typed numbers */
  }
  .answer-input::-webkit-outer-spin-button,
  .answer-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .answer-input { -moz-appearance: textfield; }
  .answer-input:focus {
    border-color: #f59e0b; box-shadow: 0 0 0 4px rgba(251,191,36,0.3);
  }
  .answer-input.correct { border-color: #34d399; background: #ecfdf5; color: #065f46; }
  .answer-input.incorrect {
    border-color: #f87171; background: #fef2f2; color: #991b1b;
    animation: shake 0.4s ease;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .check-btn {
    background: linear-gradient(135deg, #ef4444, #dc2626);
    color: white; border: none; padding: 14px 48px;
    font-size: 1.2em; border-radius: 50px; cursor: pointer;
    font-weight: 700; transition: all 0.2s; margin-top: 20px;
  }
  .check-btn:hover { transform: scale(1.05); }
  .next-btn {
    background: linear-gradient(135deg, #dc2626, #991b1b);
    color: white; border: none; padding: 14px 48px;
    font-size: 1.2em; border-radius: 50px; cursor: pointer;
    font-weight: 700; transition: all 0.2s; margin-top: 12px;
  }
  .next-btn:hover { transform: scale(1.05); }

  .result { margin-top: 16px; font-size: 1.4em; font-weight: 700; min-height: 44px; }
  .result.success { color: #059669; }
  .result.tryagain { color: #dc2626; }
  .points-earned { font-size: 1.05em; color: #f59e0b; font-weight: 700; margin-top: 4px; min-height: 22px; }
  .correct-answer { font-size: 1em; color: #6b7280; margin-top: 6px; min-height: 20px; }

  .controls {
    margin-top: 20px; display: flex; gap: 12px;
    justify-content: center; flex-wrap: wrap;
  }
  .secondary-btn {
    background: #f3f4f6; color: #6b7280;
    border: 2px solid #e5e7eb; padding: 10px 28px;
    font-size: 1em; border-radius: 50px;
    cursor: pointer; font-weight: 600; transition: all 0.2s;
  }
  .secondary-btn:hover { background: #e5e7eb; }
  .home-btn { background: #fef3c7; color: #92400e; border-color: #fbbf24; }
  .home-btn:hover { background: #fde68a; }

  /* Results screen */
  .results-container {
    padding: 40px 20px;
  }
  .results-title {
    font-size: 2em; font-weight: 900; color: #7f1d1d; margin-bottom: 30px;
  }
  .results-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 20px; margin-bottom: 30px;
  }
  .result-box {
    background: #fef2f2; border: 3px solid #fca5a5;
    border-radius: 16px; padding: 20px;
  }
  .result-label {
    font-size: 0.95em; color: #6b7280; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
  }
  .result-value {
    font-size: 2.4em; font-weight: 900; color: #dc2626;
    font-family: 'Courier New', monospace;
  }
  .result-pct { font-size: 2em; }
  .grade-box {
    grid-column: 1 / -1; padding: 30px;
    background: linear-gradient(135deg, #dc2626, #991b1b);
    border-radius: 16px; color: white;
    border: 3px solid #7f1d1d;
  }
  .grade-label {
    font-size: 0.9em; font-weight: 700; text-transform: uppercase;
    opacity: 0.9; margin-bottom: 8px; letter-spacing: 0.5px;
  }
  .grade-letter {
    font-size: 3.5em; font-weight: 900; font-family: 'Courier New', monospace;
    margin-bottom: 8px;
  }
  .grade-message {
    font-size: 1.2em; font-weight: 600;
  }

  /* Confetti */
  .confetti-container {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 999; overflow: hidden;
  }
  .confetti-piece {
    position: absolute; width: 10px; height: 10px; border-radius: 2px;
    animation: confettiFall 1.5s ease-out forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg) scale(0.3); opacity: 0; }
  }

  /* Error rate bar */
  .error-bar-container {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 9000;
    background: rgba(30,30,60,0.95);
    padding: 6px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 0.8em;
    backdrop-filter: blur(8px);
  }
  .error-bar-label {
    color: rgba(255,255,255,0.7);
    font-weight: 600;
    white-space: nowrap;
    min-width: 70px;
  }
  .error-bar-track {
    flex: 1;
    height: 10px;
    background: rgba(255,255,255,0.15);
    border-radius: 5px;
    position: relative;
    overflow: visible;
  }
  .error-bar-fill {
    height: 100%;
    border-radius: 5px;
    transition: width 0.5s ease, background 0.5s ease;
  }
  .error-bar-threshold {
    position: absolute;
    left: 75%;
    top: -3px;
    bottom: -3px;
    width: 2px;
    background: #fbbf24;
    border-radius: 1px;
  }
  .error-bar-threshold::after {
    content: '75%';
    position: absolute;
    top: -16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.75em;
    color: #fbbf24;
    white-space: nowrap;
  }
  .error-bar-pct {
    color: white;
    font-weight: 700;
    min-width: 45px;
    text-align: right;
  }
  .error-bar-pts {
    color: #fbbf24;
    font-weight: 700;
    min-width: 60px;
    text-align: right;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="error-bar-container" id="errorBar" style="display:none;"></div>

<div class="game-container" id="app"></div>

<script>
if (!sessionStorage.getItem('km_currentAccount')) {
  const backup = localStorage.getItem('km_currentAccount_backup');
  if (backup) { sessionStorage.setItem('km_currentAccount', backup); }
  else { window.location.href = 'login.html'; }
}
const accountId = sessionStorage.getItem('km_currentAccount') || 'default';
// ---- Player & score management ----
function getPlayerFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get('player') || '';
}
function getScores() {
  try { const raw = localStorage.getItem('km_' + accountId + '_scores'); if (raw) return JSON.parse(raw); } catch(e) {}
  return {};
}
function saveScores(scores) { localStorage.setItem('km_' + accountId + '_scores', JSON.stringify(scores)); }
function addPoints(pts) {
  if (!currentPlayer) return;
  const scores = getScores();
  scores[currentPlayer] = (scores[currentPlayer] || 0) + pts;
  saveScores(scores);
}
function getStats() {
  try {
    const raw = localStorage.getItem('km_' + accountId + '_stats');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {};
}
function saveStats(stats) { localStorage.setItem('km_' + accountId + '_stats', JSON.stringify(stats)); }
function recordAttempt(isCorrect) {
  if (!currentPlayer) return;
  const stats = getStats();
  if (!stats[currentPlayer]) stats[currentPlayer] = { correct: 0, total: 0 };
  stats[currentPlayer].total++;
  if (isCorrect) stats[currentPlayer].correct++;
  saveStats(stats);
  updateErrorBar();
}

function updateErrorBar() {
  if (!currentPlayer) { document.getElementById('errorBar').style.display = 'none'; return; }
  const stats = getStats();
  const s = stats[currentPlayer] || { correct: 0, total: 0 };
  const totalPts = getTotalPoints();
  const accuracy = s.total > 0 ? Math.round((s.correct / s.total) * 100) : 100;
  const barColor = accuracy >= 75 ? '#34d399' : accuracy >= 50 ? '#fbbf24' : '#f87171';
  const bar = document.getElementById('errorBar');
  bar.style.display = 'flex';
  bar.innerHTML = '<span class="error-bar-label">Accuracy</span>' +
    '<div class="error-bar-track">' +
    '<div class="error-bar-fill" style="width:' + accuracy + '%;background:' + barColor + ';"></div>' +
    '<div class="error-bar-threshold"></div>' +
    '</div>' +
    '<span class="error-bar-pct" style="color:' + barColor + ';">' + accuracy + '%</span>' +
    '<span class="error-bar-pts">' + totalPts.toLocaleString() + ' pts</span>';
}
function getTotalPoints() {
  if (!currentPlayer) return 0;
  return getScores()[currentPlayer] || 0;
}

const currentPlayer = getPlayerFromURL();
const app = document.getElementById('app');

let state = {
  screen: 'setup', // setup | play | results
  difficulty: 'easy',
  timeRemaining: 300, // 5 minutes in seconds
  timerRunning: false,
  questionsAttempted: 0,
  correctAnswers: 0,
  totalPoints: 0,

  // Current question
  currentQuestion: null,
  userAnswer: '',
  checked: false,
  isCorrect: false,
  resultMsg: '',
  resultClass: '',
  pointsMsg: '',
  showCorrect: ''
};

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function gcd(a, b) {
  a = Math.abs(a);
  b = Math.abs(b);
  while (b) { let t = b; b = a % b; a = t; }
  return a;
}

function simplifyFraction(num, den) {
  const g = gcd(num, den);
  return { num: num / g, den: den / g };
}

function getDifficultyPoints() {
  return state.difficulty === 'easy' ? 1 : state.difficulty === 'medium' ? 2 : 3;
}

// ---- Question generators ----

function generateAdditionSubtraction() {
  let min, max;
  if (state.difficulty === 'easy') { min = 10; max = 999; }
  else if (state.difficulty === 'medium') { min = 100; max = 9999; }
  else { min = 1000; max = 99999; }

  const op = Math.random() < 0.5 ? '+' : '-';
  let num1, num2, answer;

  if (op === '+') {
    num1 = randInt(min, max);
    num2 = randInt(min, max);
    answer = num1 + num2;
  } else {
    let a = randInt(min, max);
    let b = randInt(min, max);
    if (a < b) { let t = a; a = b; b = t; }
    num1 = a;
    num2 = b;
    answer = a - b;
  }

  const opDisplay = op === '+' ? '+' : '−';
  return {
    category: 'Addition/Subtraction',
    text: `${num1.toLocaleString()} ${opDisplay} ${num2.toLocaleString()} = ?`,
    answer: answer.toString(),
    answerType: 'number'
  };
}

function generateMultiplication() {
  let num1, num2, answer;

  if (state.difficulty === 'easy') {
    num1 = randInt(2, 9);
    num2 = randInt(2, 9);
  } else if (state.difficulty === 'medium') {
    num1 = randInt(10, 99);
    num2 = randInt(2, 9);
  } else {
    num1 = randInt(10, 99);
    num2 = randInt(10, 99);
  }

  answer = num1 * num2;
  return {
    category: 'Multiplication',
    text: `${num1.toLocaleString()} × ${num2.toLocaleString()} = ?`,
    answer: answer.toString(),
    answerType: 'number'
  };
}

function generateFraction() {
  if (state.difficulty === 'easy') return null; // Easy has no fractions

  const denominators = [2, 3, 4, 5, 6, 8, 10];
  const den1 = denominators[randInt(0, denominators.length - 1)];
  const den2 = denominators[randInt(0, denominators.length - 1)];
  const num1 = randInt(1, den1 - 1);
  const num2 = randInt(1, den2 - 1);
  const op = Math.random() < 0.5 ? '+' : '-';

  let resultNum, resultDen;
  if (op === '+') {
    resultNum = num1 * den2 + num2 * den1;
    resultDen = den1 * den2;
  } else {
    resultNum = num1 * den2 - num2 * den1;
    resultDen = den1 * den2;
    if (resultNum < 0) resultNum = Math.abs(resultNum);
  }

  const simplified = simplifyFraction(resultNum, resultDen);
  return {
    category: 'Fractions',
    text: `${num1}/${den1} ${op} ${num2}/${den2} = ?`,
    answer: `${simplified.num}/${simplified.den}`,
    answerAlt: `${resultNum}/${resultDen}`, // unsimplified also accepted
    answerType: 'fraction'
  };
}

function generateSequence() {
  let numbers, blank, pattern;

  if (state.difficulty === 'easy') {
    const step = randInt(2, 10);
    const start = randInt(1, 20);
    numbers = [start, start + step, start + 2*step, start + 3*step];
    blank = randInt(0, 3);
    pattern = `+${step}`;
  } else if (state.difficulty === 'medium') {
    const choice = Math.random();
    if (choice < 0.6) {
      const step = randInt(2, 8);
      const start = randInt(1, 15);
      numbers = [start, start + step, start + 2*step, start + 3*step, start + 4*step];
      pattern = `+${step}`;
    } else {
      const mult = randInt(2, 4);
      const start = randInt(1, 10);
      numbers = [start, start * mult, start * mult * mult, start * mult * mult * mult, start * mult * mult * mult * mult];
      pattern = `×${mult}`;
    }
    blank = randInt(0, 4);
  } else {
    const choice = Math.random();
    if (choice < 0.5) {
      const step1 = randInt(2, 5);
      const step2 = randInt(step1 + 1, 10);
      const start = randInt(1, 10);
      numbers = [start, start + step1, start + step1 + step2, start + step1 + step2 + step2, start + step1 + step2 + step2 + step2];
      pattern = 'growing step';
    } else {
      const a = randInt(2, 6);
      const b = randInt(2, 6);
      const start = randInt(1, 8);
      numbers = [start, start + a, start + a + b, start + a + b + a, start + a + b + a + b];
      pattern = 'alternating add';
    }
    blank = randInt(1, 3);
  }

  const answer = numbers[blank];
  const displayed = numbers.map((n, i) => i === blank ? '__' : n).join(', ');

  return {
    category: 'Sequence',
    text: `${displayed}`,
    answer: answer.toString(),
    answerType: 'number'
  };
}

function generateWordProblem() {
  const names = ['Alex', 'Jordan', 'Casey', 'Morgan', 'Riley', 'Parker', 'Taylor'];
  const name = names[randInt(0, names.length - 1)];
  const pronoun = Math.random() < 0.5 ? 'He' : 'She';

  if (state.difficulty === 'easy') {
    const items = ['apples', 'books', 'stickers', 'toys', 'coins'];
    const item = items[randInt(0, items.length - 1)];
    const has = randInt(5, 20);
    const gets = randInt(3, 15);
    const answer = has + gets;
    return {
      category: 'Word Problem',
      text: `${name} has ${has} ${item}. ${pronoun} gets ${gets} more. How many ${item} does ${name} have now?`,
      answer: answer.toString(),
      answerType: 'number'
    };
  } else if (state.difficulty === 'medium') {
    const choice = Math.random();
    if (choice < 0.5) {
      const items = ['cookies', 'pencils', 'marbles', 'beads'];
      const item = items[randInt(0, items.length - 1)];
      const boxes = randInt(2, 6);
      const each = randInt(8, 20);
      const answer = boxes * each;
      return {
        category: 'Word Problem',
        text: `${name} has ${boxes} boxes of ${item}. Each box has ${each} ${item}. How many ${item} does ${name} have in total?`,
        answer: answer.toString(),
        answerType: 'number'
      };
    } else {
      const items = ['coins', 'stickers', 'candies'];
      const item = items[randInt(0, items.length - 1)];
      const has = randInt(15, 50);
      const gives = randInt(5, has - 5);
      const answer = has - gives;
      return {
        category: 'Word Problem',
        text: `${name} has ${has} ${item}. ${pronoun} gives ${gives} away. How many ${item} does ${name} have left?`,
        answer: answer.toString(),
        answerType: 'number'
      };
    }
  } else {
    const items = ['stickers', 'coins', 'toys'];
    const item = items[randInt(0, items.length - 1)];
    const start = randInt(20, 50);
    const lose = randInt(5, start - 10);
    const gain = randInt(10, 30);
    const answer = start - lose + gain;
    return {
      category: 'Word Problem',
      text: `${name} starts with ${start} ${item}. ${pronoun} loses ${lose}, then finds ${gain} more. How many ${item} does ${name} have now?`,
      answer: answer.toString(),
      answerType: 'number'
    };
  }
}

function generateQuestion() {
  const categories = ['addition', 'multiplication', 'word'];
  if (state.difficulty !== 'easy') categories.push('fraction', 'sequence');

  const cat = categories[randInt(0, categories.length - 1)];

  switch (cat) {
    case 'addition': return generateAdditionSubtraction();
    case 'multiplication': return generateMultiplication();
    case 'fraction': return generateFraction() || generateMultiplication();
    case 'sequence': return generateSequence();
    case 'word': return generateWordProblem();
    default: return generateMultiplication();
  }
}

function renderPlayerBanner() {
  if (!currentPlayer) return '';
  const avatarClass = currentPlayer.toLowerCase();
  const initial = currentPlayer[0];
  const totalPts = getTotalPoints();
  return `
    <div class="player-banner">
      <div class="pb-avatar ${avatarClass}">${initial}</div>
      <span class="pb-name">${currentPlayer}</span>
      <span style="color:#ccc;">|</span>
      <span class="pb-pts">${totalPts.toLocaleString()} pts</span>
    </div>
  `;
}

function formatTime(seconds) {
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
}

function startTimer() {
  state.timerRunning = true;
  const timerInterval = setInterval(() => {
    state.timeRemaining--;
    render();

    if (state.timeRemaining <= 0) {
      clearInterval(timerInterval);
      state.timerRunning = false;
      finishExam();
    }
  }, 1000);
}

function finishExam() {
  state.screen = 'results';
  render();
}

function render() {
  if (state.screen === 'setup') {
    renderSetup();
  } else if (state.screen === 'play') {
    renderPlay();
  } else if (state.screen === 'results') {
    renderResults();
  }
}

function renderSetup() {
  app.innerHTML = `
    ${renderPlayerBanner()}
    <h1>5-Minute Exam</h1>
    <p class="subtitle">Mix of questions from all topics. Can you beat the clock?</p>
    <div class="setup">
      <label>Difficulty:</label>
      <div class="difficulty-toggle">
        <button class="diff-btn ${state.difficulty === 'easy' ? 'active' : ''}" onclick="setDifficulty('easy')">Easy <span style="color:#f59e0b;font-size:0.85em;">★ 1pt</span></button>
        <button class="diff-btn ${state.difficulty === 'medium' ? 'active' : ''}" onclick="setDifficulty('medium')">Medium <span style="color:#f59e0b;font-size:0.85em;">★★ 2pts</span></button>
        <button class="diff-btn ${state.difficulty === 'hard' ? 'active' : ''}" onclick="setDifficulty('hard')">Hard <span style="color:#f59e0b;font-size:0.85em;">★★★ 3pts</span></button>
      </div>
      <div style="margin-top:14px; padding:14px 20px; background:linear-gradient(135deg, #fef3c7, #fde68a); border:2px solid #fbbf24; border-radius:14px; display:inline-block;">
        <div style="font-size:1.1em; font-weight:800; color:#92400e;">🏆 Accuracy Bonus</div>
        <div style="font-size:0.88em; color:#78350f; margin-top:4px;">Score <b>75%+</b> accuracy → earn <b>2× bonus points</b> on top!</div>
        <div style="font-size:0.78em; color:#a16207; margin-top:2px;">Score <b>90%+</b> → earn <b>3× bonus points!</b></div>
      </div>
      <p style="color:#aaa;font-size:0.85em;margin-top:10px;">Get as many correct as you can in 5 minutes!</p>
      <br>
      <button class="go-btn" onclick="startGame()">Start Exam</button>
    </div>
    <div class="controls">
      <button class="secondary-btn home-btn" onclick="goHome()">Back to Home</button>
    </div>
  `;
}

function renderPlay() {
  const inputClass = state.checked ? (state.isCorrect ? 'correct' : 'incorrect') : '';
  const pts = getDifficultyPoints();
  const timerClass = state.timeRemaining < 60 ? 'warning' : '';

  app.innerHTML = `
    ${renderPlayerBanner()}
    <h1>5-Minute Exam</h1>
    <div class="timer-display ${timerClass}">${formatTime(state.timeRemaining)}</div>
    <div class="score-bar">
      <div>Correct: <span>${state.correctAnswers}</span></div>
      <div>Total: <span>${state.questionsAttempted}</span></div>
      <div>Points: <span>${state.totalPoints}</span></div>
    </div>
    <p class="subtitle"><span style="color:#f59e0b;">+${pts} point${pts > 1 ? 's' : ''} per correct</span></p>

    <div class="question-area">
      <div class="question-category">${state.currentQuestion.category}</div>
      <div class="question-text">${state.currentQuestion.text}</div>
      <div class="answer-row">
        <input type="text" dir="ltr" class="answer-input ${inputClass}" id="answerInput"
          value="${state.userAnswer}"
          oninput="onInput(this.value)"
          onkeydown="if(event.key==='Enter'){event.preventDefault(); if(!state.checked) checkAnswer(); }"
          ${state.checked ? 'disabled' : ''}
          placeholder="Answer">
      </div>
    </div>

    ${!state.checked ? `
      <button class="check-btn" onclick="checkAnswer()">Submit →</button>
    ` : ``}

    <div class="result ${state.resultClass}">${state.resultMsg}</div>
    <div class="points-earned">${state.pointsMsg}</div>
    <div class="correct-answer">${state.showCorrect}</div>

    <div class="controls">
      <button class="secondary-btn home-btn" onclick="endExam()">End Exam</button>
    </div>
  `;

  if (!state.checked) {
    const inp = document.getElementById('answerInput');
    if (inp) inp.focus();
  }
  updateErrorBar();
}

function renderResults() {
  const total = state.questionsAttempted;
  const correct = state.correctAnswers;
  const accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;
  const basePoints = state.totalPoints;

  // Accuracy bonus: 75%+ → 2× bonus, 90%+ → 3× bonus
  let bonusMultiplier = 0;
  let bonusLabel = '';
  if (accuracy >= 90) {
    bonusMultiplier = 3;
    bonusLabel = '3× BONUS (90%+ accuracy!)';
  } else if (accuracy >= 75) {
    bonusMultiplier = 2;
    bonusLabel = '2× BONUS (75%+ accuracy!)';
  }

  const bonusPoints = bonusMultiplier > 0 ? basePoints * (bonusMultiplier - 1) : 0;
  const grandTotal = basePoints + bonusPoints;

  // Award bonus points to the player's score
  if (bonusPoints > 0 && !state.bonusAwarded) {
    addPoints(bonusPoints);
    state.bonusAwarded = true;
  }

  let grade, gradeMsg;
  if (accuracy >= 90) { grade = 'A+'; gradeMsg = 'Outstanding! You\'re a math champion!'; }
  else if (accuracy >= 80) { grade = 'A'; gradeMsg = 'Excellent work! Very impressive!'; }
  else if (accuracy >= 70) { grade = 'B'; gradeMsg = 'Great job! You did well!'; }
  else if (accuracy >= 60) { grade = 'C'; gradeMsg = 'Good effort! Keep practicing!'; }
  else { grade = 'D'; gradeMsg = 'Keep trying! You\'ll get better!'; }

  const bonusHTML = bonusPoints > 0 ? `
    <div class="result-box" style="grid-column: 1 / -1; background: linear-gradient(135deg, #fef3c7, #fde68a); border-color: #fbbf24;">
      <div class="result-label" style="color:#92400e;">🏆 ${bonusLabel}</div>
      <div style="display:flex; justify-content:center; align-items:baseline; gap:12px; flex-wrap:wrap;">
        <div style="font-size:1em; color:#78350f;">${basePoints} base</div>
        <div style="font-size:1.4em; color:#f59e0b; font-weight:900;">+ ${bonusPoints} bonus</div>
        <div style="font-size:1em; color:#78350f;">=</div>
        <div class="result-value" style="color:#dc2626;">${grandTotal}</div>
      </div>
    </div>
  ` : `
    <div class="result-box" style="grid-column: 1 / -1; background: #f9fafb; border-color: #e5e7eb;">
      <div class="result-label" style="color:#9ca3af;">No accuracy bonus</div>
      <div style="font-size:0.9em; color:#9ca3af;">Score 75%+ to earn 2× bonus, 90%+ for 3×!</div>
    </div>
  `;

  app.innerHTML = `
    ${renderPlayerBanner()}
    <div class="results-container">
      <div class="results-title">Exam Complete!</div>

      <div class="results-grid">
        <div class="result-box">
          <div class="result-label">Questions</div>
          <div class="result-value">${total}</div>
        </div>
        <div class="result-box">
          <div class="result-label">Correct</div>
          <div class="result-value">${correct}</div>
        </div>
        <div class="result-box">
          <div class="result-label">Accuracy</div>
          <div class="result-value result-pct" style="color:${accuracy >= 75 ? '#059669' : '#dc2626'}">${accuracy}%</div>
        </div>
        <div class="result-box">
          <div class="result-label">Base Points</div>
          <div class="result-value">${basePoints}</div>
        </div>

        ${bonusHTML}

        <div class="grade-box">
          <div class="grade-label">Your Grade</div>
          <div class="grade-letter">${grade}</div>
          <div class="grade-message">${gradeMsg}</div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="secondary-btn" onclick="retakeExam()">Retake Exam</button>
      <button class="secondary-btn home-btn" onclick="goHome()">Back to Home</button>
    </div>
  `;

  updateErrorBar();
}

function setDifficulty(d) { state.difficulty = d; render(); }

function startGame() {
  state.screen = 'play';
  state.questionsAttempted = 0;
  state.correctAnswers = 0;
  state.totalPoints = 0;
  state.timeRemaining = 300;
  state.userAnswer = '';
  state.checked = false;
  state.resultMsg = '';
  state.resultClass = '';
  state.pointsMsg = '';
  state.showCorrect = '';

  state.bonusAwarded = false;
  state.currentQuestion = generateQuestion();
  render();
  startTimer();
}

function retakeExam() {
  state.screen = 'setup';
  render();
}

function onInput(val) { state.userAnswer = val; }

function checkAnswer() {
  if (state.userAnswer.trim() === '') {
    state.resultMsg = 'Type your answer first!';
    state.resultClass = 'tryagain';
    render();
    return;
  }

  state.checked = true;

  let isCorrect = false;
  const userTrimmed = state.userAnswer.trim().toLowerCase();
  const answerTrimmed = state.currentQuestion.answer.toLowerCase();

  if (state.currentQuestion.answerType === 'fraction') {
    isCorrect = userTrimmed === answerTrimmed ||
                (state.currentQuestion.answerAlt && userTrimmed === state.currentQuestion.answerAlt.toLowerCase());
  } else {
    isCorrect = userTrimmed === answerTrimmed;
  }

  state.questionsAttempted++;

  if (isCorrect) {
    recordAttempt(true);
    state.isCorrect = true;
    state.correctAnswers++;
    const earnedPts = getDifficultyPoints();
    state.totalPoints += earnedPts;
    addPoints(earnedPts);

    const cheers = ['Amazing!', 'Perfect!', 'Brilliant!', 'You nailed it!', 'Superstar!'];
    const cheer = cheers[Math.floor(Math.random() * cheers.length)];
    state.resultMsg = `${cheer} ⭐`;
    state.resultClass = 'success';
    state.pointsMsg = `+${earnedPts} point${earnedPts > 1 ? 's' : ''}!`;
    launchConfetti();
  } else {
    recordAttempt(false);
    state.isCorrect = false;
    state.resultMsg = 'Not quite! 💪';
    state.resultClass = 'tryagain';
    state.pointsMsg = '';
    state.showCorrect = `Answer: ${state.currentQuestion.answer}`;
  }
  render();
  // Auto-advance to next question after a brief pause
  setTimeout(() => { if (state.checked && state.timerRunning) nextQuestion(); }, state.isCorrect ? 1000 : 2000);
}

function nextQuestion() {
  state.currentQuestion = generateQuestion();
  state.userAnswer = '';
  state.checked = false;
  state.isCorrect = false;
  state.resultMsg = '';
  state.resultClass = '';
  state.pointsMsg = '';
  state.showCorrect = '';
  render();
}

function endExam() {
  state.timerRunning = false;
  finishExam();
}

function goHome() { window.location.href = 'index.html'; }

function launchConfetti() {
  const container = document.createElement('div');
  container.className = 'confetti-container';
  document.body.appendChild(container);
  const colors = ['#fbbf24', '#34d399', '#818cf8', '#f472b6', '#0ea5e9', '#e94560'];
  for (let i = 0; i < 40; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.top = '-10px';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = (Math.random() * 0.5) + 's';
    piece.style.animationDuration = (1 + Math.random()) + 's';
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (6 + Math.random() * 8) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    container.appendChild(piece);
  }
  setTimeout(() => container.remove(), 2500);
}

// Start
render();
</script>
</body>
</html>
