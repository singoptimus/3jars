<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrix Puzzles</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 50%, #4c1d95 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 36px 20px 20px 20px;
  }
  .game-container {
    background: white;
    border-radius: 24px;
    padding: 36px;
    max-width: 640px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    text-align: center;
  }
  h1 { font-size: 2.2em; color: #4c1d95; margin-bottom: 8px; }
  .subtitle { color: #888; font-size: 1.05em; margin-bottom: 24px; }

  /* Player banner */
  .player-banner {
    display: inline-flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, #ede9fe, #ddd6fe);
    border: 2px solid #a78bfa; border-radius: 50px;
    padding: 8px 20px 8px 10px; margin-bottom: 20px; font-size: 1em;
  }
  .pb-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 0.9em; color: white;
  }
  .pb-avatar.ozzy { background: linear-gradient(135deg, #667eea, #764ba2); }
  .pb-avatar.elinor { background: linear-gradient(135deg, #f472b6, #e94560); }
  .pb-avatar.adam { background: linear-gradient(135deg, #34d399, #059669); }
  .pb-name { font-weight: 700; color: #4c1d95; }
  .pb-pts { color: #f59e0b; font-weight: 700; }

  .score-bar {
    display: flex; justify-content: center; gap: 30px;
    margin-bottom: 20px; font-size: 1.05em; color: #6b7280;
  }
  .score-bar span { font-weight: 700; color: #4c1d95; }

  /* Setup */
  .setup { margin-bottom: 30px; }
  .setup label { font-size: 1.2em; color: #555; display: block; margin-bottom: 12px; }
  .difficulty-toggle {
    display: flex; gap: 8px; justify-content: center;
    margin-top: 12px; margin-bottom: 6px;
  }
  .diff-btn {
    padding: 8px 16px; border-radius: 20px;
    border: 2px solid #c4b5fd; background: white;
    color: #4c1d95; font-weight: 600; cursor: pointer;
    font-size: 0.9em; transition: all 0.2s;
  }
  .diff-btn:hover { background: #ede9fe; }
  .diff-btn.active { background: #7c3aed; color: white; border-color: #7c3aed; }
  .go-btn {
    background: linear-gradient(135deg, #7c3aed, #6d28d9);
    color: white; border: none; padding: 14px 48px; font-size: 1.3em;
    border-radius: 50px; cursor: pointer; font-weight: 700;
    transition: all 0.2s; margin-top: 16px;
  }
  .go-btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(124,58,237,0.4); }

  /* 3x3 Matrix Grid */
  .matrix-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    max-width: 330px;
    margin: 20px auto;
    background: #e5e7eb;
    padding: 6px;
    border-radius: 18px;
  }
  .matrix-cell {
    width: 100px; height: 100px;
    background: white;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .matrix-cell svg { width: 64px; height: 64px; }
  .matrix-cell.mystery {
    background: #fef3c7;
    border: 3px dashed #f59e0b;
  }
  .matrix-cell.mystery::after {
    content: '?';
    font-size: 2.5em;
    font-weight: 800;
    color: #f59e0b;
  }

  /* Row/col hints */
  .grid-wrapper {
    display: inline-block;
    position: relative;
  }
  .row-arrow {
    position: absolute;
    left: -28px;
    font-size: 0.9em;
    color: #a78bfa;
    font-weight: 600;
  }

  /* Choices */
  .choices-label {
    font-size: 1.1em; color: #555; margin: 20px 0 12px; font-weight: 600;
  }
  .choices {
    display: flex; flex-wrap: wrap; gap: 10px;
    justify-content: center; margin-bottom: 16px;
  }
  .choice-cell {
    width: 90px; height: 90px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    border: 3px solid #e5e7eb; background: white;
    cursor: pointer; transition: all 0.2s; position: relative;
  }
  .choice-cell svg { width: 58px; height: 58px; }
  .choice-cell:hover {
    border-color: #7c3aed; background: #f5f3ff;
    transform: translateY(-4px); box-shadow: 0 6px 16px rgba(0,0,0,0.1);
  }
  .choice-cell.selected {
    border-color: #7c3aed; background: #ede9fe;
    box-shadow: 0 0 0 3px rgba(124,58,237,0.3);
  }
  .choice-cell.correct-pick {
    border-color: #34d399; background: #ecfdf5;
    box-shadow: 0 0 0 3px rgba(52,211,153,0.4);
  }
  .choice-cell.wrong-pick {
    border-color: #f87171; background: #fef2f2;
    box-shadow: 0 0 0 3px rgba(248,113,113,0.3);
  }
  .choice-cell.show-correct { border-color: #34d399; background: #ecfdf5; }
  .choice-cell.disabled { pointer-events: none; }
  .choice-letter {
    position: absolute; top: 4px; left: 8px;
    font-size: 0.7em; font-weight: 700; color: #aaa;
  }

  .check-btn {
    background: linear-gradient(135deg, #34d399, #059669);
    color: white; border: none; padding: 14px 48px;
    font-size: 1.2em; border-radius: 50px; cursor: pointer;
    font-weight: 700; transition: all 0.2s; margin-top: 8px;
  }
  .check-btn:hover { transform: scale(1.05); }
  .check-btn:disabled { opacity: 0.4; cursor: default; transform: none; }
  .next-btn {
    background: linear-gradient(135deg, #7c3aed, #6d28d9);
    color: white; border: none; padding: 14px 48px;
    font-size: 1.2em; border-radius: 50px; cursor: pointer;
    font-weight: 700; transition: all 0.2s; margin-top: 12px;
  }
  .next-btn:hover { transform: scale(1.05); }

  .result { margin-top: 16px; font-size: 1.4em; font-weight: 700; min-height: 44px; }
  .result.success { color: #059669; }
  .result.tryagain { color: #dc2626; }
  .points-earned { font-size: 1.05em; color: #f59e0b; font-weight: 700; margin-top: 4px; min-height: 22px; }

  .controls {
    margin-top: 20px; display: flex; gap: 12px;
    justify-content: center; flex-wrap: wrap;
  }
  .secondary-btn {
    background: #f3f4f6; color: #6b7280;
    border: 2px solid #e5e7eb; padding: 10px 28px;
    font-size: 1em; border-radius: 50px;
    cursor: pointer; font-weight: 600; transition: all 0.2s;
  }
  .secondary-btn:hover { background: #e5e7eb; }
  .home-btn { background: #fef3c7; color: #92400e; border-color: #fbbf24; }
  .home-btn:hover { background: #fde68a; }

  .confetti-container {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 999; overflow: hidden;
  }
  .confetti-piece {
    position: absolute; width: 10px; height: 10px; border-radius: 2px;
    animation: confettiFall 1.5s ease-out forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg) scale(0.3); opacity: 0; }
  }

  /* Error rate bar */
  .error-bar-container {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 9000;
    background: rgba(30,30,60,0.95);
    padding: 6px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 0.8em;
    backdrop-filter: blur(8px);
  }
  .error-bar-label {
    color: rgba(255,255,255,0.7);
    font-weight: 600;
    white-space: nowrap;
    min-width: 70px;
  }
  .error-bar-track {
    flex: 1;
    height: 10px;
    background: rgba(255,255,255,0.15);
    border-radius: 5px;
    position: relative;
    overflow: visible;
  }
  .error-bar-fill {
    height: 100%;
    border-radius: 5px;
    transition: width 0.5s ease, background 0.5s ease;
  }
  .error-bar-threshold {
    position: absolute;
    left: 75%;
    top: -3px;
    bottom: -3px;
    width: 2px;
    background: #fbbf24;
    border-radius: 1px;
  }
  .error-bar-threshold::after {
    content: '75%';
    position: absolute;
    top: -16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.75em;
    color: #fbbf24;
    white-space: nowrap;
  }
  .error-bar-pct {
    color: white;
    font-weight: 700;
    min-width: 45px;
    text-align: right;
  }
  .error-bar-pts {
    color: #fbbf24;
    font-weight: 700;
    min-width: 60px;
    text-align: right;
    white-space: nowrap;
  }

  @media (max-width: 500px) {
    .matrix-cell { width: 80px; height: 80px; }
    .matrix-cell svg { width: 50px; height: 50px; }
    .matrix-grid { max-width: 270px; }
    .choice-cell { width: 75px; height: 75px; }
    .choice-cell svg { width: 48px; height: 48px; }
  }
</style>
</head>
<body>
<div class="error-bar-container" id="errorBar" style="display:none;"></div>
<div class="game-container" id="app"></div>
<script src="firebase-sync.js"></script>
<script>
if (!sessionStorage.getItem('km_currentAccount')) {
  const backup = localStorage.getItem('km_currentAccount_backup');
  if (backup) { sessionStorage.setItem('km_currentAccount', backup); }
  else if (!sessionStorage.getItem('km_guest')) { window.location.href = 'login.html'; }
}
const isGuest = sessionStorage.getItem('km_guest') === 'true';
const accountId = sessionStorage.getItem('km_currentAccount') || 'guest';
// ---- Player & score management ----
function getPlayerFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get('player') || '';
}
function getScores() {
  try { const raw = localStorage.getItem('km_' + accountId + '_scores'); if (raw) return JSON.parse(raw); } catch(e) {}
  return {};
}
function saveScores(scores) {
  localStorage.setItem('km_' + accountId + '_scores', JSON.stringify(scores));
  if (typeof firebaseSaveScores === 'function') firebaseSaveScores(accountId, scores);
}
function addPoints(pts) {
  if (isGuest) return;
  if (!currentPlayer) return;
  const scores = getScores();
  scores[currentPlayer] = (scores[currentPlayer] || 0) + pts;
  saveScores(scores);
}
function getTotalPoints() {
  if (!currentPlayer) return 0;
  return getScores()[currentPlayer] || 0;
}

function getStats() {
  try {
    const raw = localStorage.getItem('km_' + accountId + '_stats');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {};
}
function saveStats(stats) {
  localStorage.setItem('km_' + accountId + '_stats', JSON.stringify(stats));
  if (typeof firebaseSaveStats === 'function') firebaseSaveStats(accountId, stats);
}
function recordAttempt(isCorrect) {
  if (!currentPlayer) return;
  const stats = getStats();
  if (!stats[currentPlayer]) stats[currentPlayer] = { correct: 0, total: 0 };
  stats[currentPlayer].total++;
  if (isCorrect) stats[currentPlayer].correct++;
  saveStats(stats);
  updateErrorBar();
}

function updateErrorBar() {
  if (!currentPlayer) { document.getElementById('errorBar').style.display = 'none'; return; }
  const stats = getStats();
  const s = stats[currentPlayer] || { correct: 0, total: 0 };
  const totalPts = getTotalPoints();
  const accuracy = s.total > 0 ? Math.round((s.correct / s.total) * 100) : 100;
  const barColor = accuracy >= 75 ? '#34d399' : accuracy >= 50 ? '#fbbf24' : '#f87171';
  const bar = document.getElementById('errorBar');
  bar.style.display = 'flex';
  bar.innerHTML = '<span class="error-bar-label">Accuracy</span>' +
    '<div class="error-bar-track">' +
    '<div class="error-bar-fill" style="width:' + accuracy + '%;background:' + barColor + ';"></div>' +
    '<div class="error-bar-threshold"></div>' +
    '</div>' +
    '<span class="error-bar-pct" style="color:' + barColor + ';">' + accuracy + '%</span>' +
    '<span class="error-bar-pts">' + totalPts.toLocaleString() + ' pts</span>';
}
const currentPlayer = getPlayerFromURL();
const app = document.getElementById('app');

// Sync scores from Firebase
if (typeof firebaseSyncScores === 'function') {
  firebaseSyncScores(accountId, getScores(), function(merged) {
    localStorage.setItem('km_' + accountId + '_scores', JSON.stringify(merged));
  });
}

// ---- Utilities ----
function randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ===========================================================
//  SVG Shape Rendering (same system as Patterns game)
// ===========================================================
const COLORS = ['#7c3aed', '#0d9488', '#e94560', '#2563eb', '#f59e0b', '#059669'];
const COLOR_NAMES = { '#7c3aed': 'purple', '#0d9488': 'teal', '#e94560': 'red', '#2563eb': 'blue', '#f59e0b': 'orange', '#059669': 'green' };
const SHAPES = ['triangle', 'square', 'circle', 'diamond', 'star', 'cross', 'arrow', 'hexagon'];
const SIZES = ['small', 'medium', 'large'];

function renderShape(desc) {
  const { shape, color, rotation, size, filled } = desc;
  const s = size === 'small' ? 0.5 : size === 'large' ? 1.0 : 0.72;
  const fill = filled ? color : 'none';
  const stroke = color;
  const sw = filled ? 0 : 3;
  const inner = shapePath(shape, fill, stroke, sw);
  return `<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
    <g transform="translate(30,30) rotate(${rotation}) scale(${s}) translate(-30,-30)">${inner}</g>
  </svg>`;
}

function shapePath(shape, fill, stroke, sw) {
  const w = sw || 2.5;
  switch(shape) {
    case 'triangle': return `<polygon points="30,8 52,50 8,50" fill="${fill}" stroke="${stroke}" stroke-width="${w}"/>`;
    case 'square': return `<rect x="10" y="10" width="40" height="40" fill="${fill}" stroke="${stroke}" stroke-width="${w}"/>`;
    case 'circle': return `<circle cx="30" cy="30" r="22" fill="${fill}" stroke="${stroke}" stroke-width="${w}"/>`;
    case 'diamond': return `<polygon points="30,6 54,30 30,54 6,30" fill="${fill}" stroke="${stroke}" stroke-width="${w}"/>`;
    case 'star': return `<polygon points="30,6 36,22 54,22 40,33 45,50 30,40 15,50 20,33 6,22 24,22" fill="${fill}" stroke="${stroke}" stroke-width="${w}"/>`;
    case 'cross': return `<polygon points="22,8 38,8 38,22 52,22 52,38 38,38 38,52 22,52 22,38 8,38 8,22 22,22" fill="${fill}" stroke="${stroke}" stroke-width="${w}"/>`;
    case 'arrow': return `<polygon points="30,6 52,30 40,30 40,54 20,54 20,30 8,30" fill="${fill}" stroke="${stroke}" stroke-width="${w}"/>`;
    case 'hexagon': return `<polygon points="30,6 52,18 52,42 30,54 8,42 8,18" fill="${fill}" stroke="${stroke}" stroke-width="${w}"/>`;
    default: return `<circle cx="30" cy="30" r="22" fill="${fill}" stroke="${stroke}" stroke-width="${w}"/>`;
  }
}

function descKey(d) { return `${d.shape}-${d.color}-${d.rotation}-${d.size}-${d.filled}`; }
function visualKey(d) {
  let rot = d.rotation || 0;
  if (d.shape === 'circle') rot = 0;
  else if (d.shape === 'square' || d.shape === 'cross') rot = rot % 90;
  else if (d.shape === 'hexagon') rot = rot % 60;
  else if (d.shape === 'star') rot = rot % 72;
  else if (d.shape === 'diamond') rot = rot % 180;
  return `${d.shape}-${d.color}-${rot}-${d.size}-${d.filled}`;
}

// ===========================================================
//  Matrix Generation
// ===========================================================
// A 3x3 matrix where:
//  - Rows are indexed by one property dimension (e.g., 3 shapes)
//  - Columns by another (e.g., 3 colors)
//  - Optionally a third property changes diagonally or by (row+col)%3
// The missing cell is always bottom-right (position [2][2])

function generateMatrix() {
  if (state.difficulty === 'easy') return generateEasyMatrix();
  if (state.difficulty === 'medium') return generateMediumMatrix();
  return generateHardMatrix();
}

function generateEasyMatrix() {
  // One property changes across rows, another across columns
  // Pick which two properties to vary
  const props = shuffle(['shape', 'color', 'size']).slice(0, 2);
  const rowProp = props[0];
  const colProp = props[1];

  const vals = getPropValues(rowProp);
  const colVals = getPropValues(colProp);
  const base = getBaseDesc(rowProp, colProp);

  const grid = [];
  for (let r = 0; r < 3; r++) {
    const row = [];
    for (let c = 0; c < 3; c++) {
      const d = { ...base };
      d[rowProp] = vals[r];
      d[colProp] = colVals[c];
      row.push(d);
    }
    grid.push(row);
  }
  return grid;
}

function generateMediumMatrix() {
  // Two properties change (rows & cols) + rotation varies by column
  const props = shuffle(['shape', 'color', 'size']).slice(0, 2);
  const rowProp = props[0];
  const colProp = props[1];

  const rowVals = getPropValues(rowProp);
  const colVals = getPropValues(colProp);
  const rotations = shuffle([0, 90, 180]).slice(0, 3);
  const base = getBaseDesc(rowProp, colProp);

  const grid = [];
  for (let r = 0; r < 3; r++) {
    const row = [];
    for (let c = 0; c < 3; c++) {
      const d = { ...base };
      d[rowProp] = rowVals[r];
      d[colProp] = colVals[c];
      d.rotation = rotations[c];
      row.push(d);
    }
    grid.push(row);
  }
  return grid;
}

function generateHardMatrix() {
  // Three properties change: rows, columns, and a diagonal/positional one
  const allProps = shuffle(['shape', 'color', 'size']);
  const rowProp = allProps[0];
  const colProp = allProps[1];
  const diagProp = allProps[2];

  const rowVals = getPropValues(rowProp);
  const colVals = getPropValues(colProp);
  const diagVals = getPropValues(diagProp);
  const rotations = shuffle([0, 90, 180, 270]).slice(0, 3);

  const base = { shape: 'circle', color: '#7c3aed', rotation: 0, size: 'medium', filled: true };

  const grid = [];
  for (let r = 0; r < 3; r++) {
    const row = [];
    for (let c = 0; c < 3; c++) {
      const d = { ...base };
      d[rowProp] = rowVals[r];
      d[colProp] = colVals[c];
      // Diagonal property: shifts by row
      d[diagProp] = diagVals[(r + c) % 3];
      d.rotation = rotations[c];
      row.push(d);
    }
    grid.push(row);
  }
  return grid;
}

function getPropValues(prop) {
  if (prop === 'shape') return shuffle(SHAPES).slice(0, 3);
  if (prop === 'color') return shuffle(COLORS).slice(0, 3);
  if (prop === 'size') return shuffle(SIZES);
  return ['medium', 'medium', 'medium'];
}

function getBaseDesc(...excludeProps) {
  return {
    shape: excludeProps.includes('shape') ? 'circle' : pick(SHAPES),
    color: excludeProps.includes('color') ? pick(COLORS) : pick(COLORS),
    rotation: 0,
    size: excludeProps.includes('size') ? 'medium' : pick(SIZES),
    filled: Math.random() < 0.6,
  };
}

function generateWrongAnswers(correct, grid) {
  const correctKey = descKey(correct);
  const wrongs = [];
  let safety = 0;

  while (wrongs.length < 3 && safety < 200) {
    safety++;
    const w = { ...correct };
    const numTweaks = randInt(1, 2);
    for (let t = 0; t < numTweaks; t++) {
      const prop = pick(['shape', 'color', 'rotation', 'size', 'filled']);
      if (prop === 'shape') w.shape = pick(SHAPES.filter(s => s !== correct.shape));
      else if (prop === 'color') w.color = pick(COLORS.filter(c => c !== correct.color));
      else if (prop === 'rotation') w.rotation = (correct.rotation + pick([45, 90, 135, 180])) % 360;
      else if (prop === 'size') w.size = pick(SIZES.filter(s => s !== correct.size));
      else w.filled = !correct.filled;
    }
    const wVis = visualKey(w);
    const correctVis = visualKey(correct);
    if (wVis !== correctVis && !wrongs.some(x => visualKey(x) === wVis)) {
      wrongs.push(w);
    }
  }

  while (wrongs.length < 3) {
    wrongs.push({
      shape: pick(SHAPES.filter(s => s !== correct.shape)),
      color: pick(COLORS.filter(c => c !== correct.color)),
      rotation: (correct.rotation + 90) % 360,
      size: pick(SIZES),
      filled: !correct.filled
    });
  }
  return wrongs;
}

// ===========================================================
//  Game State
// ===========================================================
let state = {
  screen: 'setup',
  difficulty: 'easy',
  score: 0,
  streak: 0,
  round: 0,
  grid: [],        // 3x3 array of descriptors
  choices: [],     // shuffled choices
  correctIdx: -1,
  selectedIdx: -1,
  checked: false,
  isCorrect: false,
  resultMsg: '',
  resultClass: '',
  pointsMsg: '',
};

function getDifficultyPoints() {
  return state.difficulty === 'easy' ? 3 : state.difficulty === 'medium' ? 6 : 9;
}

function newQuestion() {
  const grid = generateMatrix();
  state.grid = grid;
  const correct = grid[2][2]; // bottom-right is always the mystery

  const wrongs = generateWrongAnswers(correct, grid);
  const allChoices = shuffle([correct, ...wrongs]);
  state.choices = allChoices;
  state.correctIdx = allChoices.findIndex(c => descKey(c) === descKey(correct));
  state.selectedIdx = -1;
  state.checked = false;
  state.isCorrect = false;
  state.resultMsg = '';
  state.resultClass = '';
  state.pointsMsg = '';
  state.round++;
}

// ===========================================================
//  Rendering
// ===========================================================
function renderPlayerBanner() {
  if (!currentPlayer) return '';
  const avatarClass = currentPlayer.toLowerCase();
  const initial = currentPlayer[0];
  const totalPts = getTotalPoints();
  return `<div class="player-banner">
    <div class="pb-avatar ${avatarClass}">${initial}</div>
    <span class="pb-name">${currentPlayer}</span>
    <span style="color:#ccc;">|</span>
    <span class="pb-pts">${totalPts.toLocaleString()} pts</span>
  </div>`;
}

function render() {
  if (state.screen === 'setup') renderSetup();
  else renderPlay();
}

function renderSetup() {
  app.innerHTML = `
    ${renderPlayerBanner()}
    <h1>🧠 Matrix Puzzles</h1>
    <p class="subtitle">Find the missing piece in the 3×3 grid!</p>
    <div class="setup">
      <label>Difficulty:</label>
      <div class="difficulty-toggle">
        <button class="diff-btn ${state.difficulty === 'easy' ? 'active' : ''}" onclick="setDifficulty('easy')">Easy <span style="color:#f59e0b;font-size:0.85em;">★★★ 3pts</span></button>
        <button class="diff-btn ${state.difficulty === 'medium' ? 'active' : ''}" onclick="setDifficulty('medium')">Medium <span style="color:#f59e0b;font-size:0.85em;">★★★★★★ 6pts</span></button>
        <button class="diff-btn ${state.difficulty === 'hard' ? 'active' : ''}" onclick="setDifficulty('hard')">Hard <span style="color:#f59e0b;font-size:0.85em;">★★★★★★★★★ 9pts</span></button>
      </div>
      <p style="color:#aaa;font-size:0.85em;margin-top:6px;">Easy: 2 rules &middot; Medium: 3 rules &middot; Hard: 4 rules changing</p>
      <br>
      <button class="go-btn" onclick="startGame()">Let's Go!</button>
    </div>
    <div class="controls">
      <button class="secondary-btn home-btn" onclick="goHome()">Back to Home</button>
    </div>
  `;
}

function renderPlay() {
  const pts = getDifficultyPoints();
  const letters = ['A', 'B', 'C', 'D'];

  // Build 3x3 grid HTML
  let gridHTML = '';
  for (let r = 0; r < 3; r++) {
    for (let c = 0; c < 3; c++) {
      if (r === 2 && c === 2) {
        // Mystery cell
        if (state.checked) {
          gridHTML += `<div class="matrix-cell" style="border:3px solid #34d399;background:#ecfdf5;">
            ${renderShape(state.grid[2][2])}
          </div>`;
        } else {
          gridHTML += '<div class="matrix-cell mystery"></div>';
        }
      } else {
        gridHTML += `<div class="matrix-cell">${renderShape(state.grid[r][c])}</div>`;
      }
    }
  }

  // Choices HTML
  let choicesHTML = state.choices.map((c, idx) => {
    let cls = 'choice-cell';
    if (state.checked) {
      cls += ' disabled';
      if (idx === state.correctIdx) cls += ' show-correct';
      if (idx === state.selectedIdx && state.isCorrect) cls += ' correct-pick';
      if (idx === state.selectedIdx && !state.isCorrect) cls += ' wrong-pick';
    } else if (idx === state.selectedIdx) {
      cls += ' selected';
    }
    return `<div class="${cls}" onclick="selectChoice(${idx})">
      <span class="choice-letter">${letters[idx]}</span>
      ${renderShape(c)}
    </div>`;
  }).join('');

  app.innerHTML = `
    ${renderPlayerBanner()}
    <h1>🧠 Matrix Puzzles</h1>
    <div class="score-bar">
      <div>Score: <span>${state.score}</span></div>
      <div>Streak: <span>${state.streak} 🔥</span></div>
      <div>Round: <span>${state.round}</span></div>
    </div>
    <p class="subtitle">Look at the rows and columns — find the pattern!
      <span style="color:#f59e0b;">+${pts}pts</span>
    </p>

    <div class="matrix-grid">${gridHTML}</div>

    <div class="choices-label">Which shape completes the grid?</div>
    <div class="choices">${choicesHTML}</div>

    ${!state.checked
      ? `<button class="check-btn" onclick="checkAnswer()" ${state.selectedIdx === -1 ? 'disabled' : ''}>Check ✓</button>`
      : `<button class="next-btn" onclick="nextQuestion()">Next Puzzle →</button>`
    }

    <div class="result ${state.resultClass}">${state.resultMsg}</div>
    <div class="points-earned">${state.pointsMsg}</div>

    <div class="controls">
      <button class="secondary-btn" onclick="changeDifficulty()">Change Difficulty</button>
      <button class="secondary-btn home-btn" onclick="goHome()">Back to Home</button>
    </div>
  `;
  updateErrorBar();
}

// ===========================================================
//  Actions
// ===========================================================
function setDifficulty(d) { state.difficulty = d; render(); }
function startGame() {
  state.screen = 'play'; state.score = 0; state.streak = 0; state.round = 0;
  newQuestion(); render();
}
function selectChoice(idx) { if (!state.checked) { state.selectedIdx = idx; render(); } }

function checkAnswer() {
  if (state.selectedIdx === -1) return;
  state.checked = true;

  if (state.selectedIdx === state.correctIdx) {
    recordAttempt(true);
    state.isCorrect = true;
    state.streak++;
    const earnedPts = getDifficultyPoints();
    state.score += earnedPts;
    addPoints(earnedPts);

    const cheers = ['Genius!', 'Perfect!', 'Brilliant mind!', 'Matrix master!', 'Incredible!'];
    const cheer = cheers[Math.floor(Math.random() * cheers.length)];
    const stars = state.streak >= 5 ? '🌟🌟🌟' : state.streak >= 3 ? '⭐⭐⭐' : state.streak >= 2 ? '⭐⭐' : '⭐';
    state.resultMsg = `${cheer} ${stars}`;
    state.resultClass = 'success';
    state.pointsMsg = `+${earnedPts} point${earnedPts > 1 ? 's' : ''}${currentPlayer ? ' for ' + currentPlayer : ''}!`;
    launchConfetti();
  } else {
    recordAttempt(false);
    state.isCorrect = false;
    state.streak = 0;
    state.resultMsg = 'Not quite! Check each row & column 💪';
    state.resultClass = 'tryagain';
    state.pointsMsg = '';
  }
  render();
}

function nextQuestion() { newQuestion(); render(); }
function changeDifficulty() { state.screen = 'setup'; render(); }
function goHome() { window.location.href = 'index.html'; }

function launchConfetti() {
  const container = document.createElement('div');
  container.className = 'confetti-container';
  document.body.appendChild(container);
  const colors = ['#7c3aed', '#fbbf24', '#34d399', '#818cf8', '#f472b6', '#0ea5e9'];
  for (let i = 0; i < 40; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.top = '-10px';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = (Math.random() * 0.5) + 's';
    piece.style.animationDuration = (1 + Math.random()) + 's';
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (6 + Math.random() * 8) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    container.appendChild(piece);
  }
  setTimeout(() => container.remove(), 2500);
}

render();
</script>
</body>
</html>
